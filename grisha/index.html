<!-- Critical preloader CSS — inlined so it paints on first byte ──────────── -->
<style>
  /* Lock the body so scrollbars don't flash before app boots */
  html, body { margin: 0; padding: 0; height: 100%; background: #050403; overflow: hidden; }

  /* The preloader sits above everything; React mounts beneath it.
     When body.app-ready is set we fade it out and remove from layout. */
  #preloader {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background:
      radial-gradient(ellipse at 50% 55%, #0d0a07 0%, #050403 65%, #020201 100%);
    color: #ede5d4;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: Georgia, 'Cormorant Garamond', 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
  }
  body.app-ready #preloader {
    opacity: 0;
    pointer-events: none;
  }
  /* After the fade completes, take it out of the layout entirely. */
  body.preloader-gone #preloader { display: none; }

  /* Soft warm vignette for cinematic feel */
  #preloader::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  /* Subtle film-grain overlay */
  #preloader::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      repeating-radial-gradient(circle at 30% 40%, rgba(245,235,215,0.012) 0, rgba(245,235,215,0.012) 1px, transparent 1px, transparent 3px),
      repeating-radial-gradient(circle at 70% 60%, rgba(245,235,215,0.01) 0, rgba(245,235,215,0.01) 1px, transparent 1px, transparent 4px);
    opacity: 0.85;
    pointer-events: none;
  }

  .preloader-inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 24px;
    transform: translateY(-2vh);
  }
  .preloader-eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(245, 235, 215, 0.55);
    margin-bottom: 28px;
    opacity: 0;
    animation: pre-fade 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
  }
  .preloader-mark {
    font-weight: 300;
    font-size: clamp(56px, 11vw, 140px);
    letter-spacing: 0.32em;
    line-height: 1;
    color: #f4ecd7;
    text-shadow: 0 0 60px rgba(178, 136, 74, 0.18);
    /* Slow elegant entrance — letters resolve from a slight blur */
    opacity: 0;
    filter: blur(8px);
    animation: pre-mark 1.8s cubic-bezier(0.2, 0.6, 0.2, 1) 0.35s forwards;
  }
  .preloader-flourish {
    margin: 22px auto 0;
    width: 64px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(178, 136, 74, 0.7), transparent);
    opacity: 0;
    animation: pre-fade 1s cubic-bezier(0.4, 0, 0.2, 1) 1.0s forwards;
  }
  .preloader-sub {
    margin-top: 18px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: rgba(245, 235, 215, 0.7);
    opacity: 0;
    animation: pre-fade 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.15s forwards;
  }

  /* Progress hairline — animates 0 → 85% on its own, then JS pushes to 100% */
  .preloader-bar {
    margin: 48px auto 0;
    width: min(280px, 70vw);
    height: 1px;
    background: rgba(245, 235, 215, 0.12);
    overflow: hidden;
    position: relative;
    opacity: 0;
    animation: pre-fade 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.4s forwards;
  }
  .preloader-bar-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, rgba(178, 136, 74, 0.4), rgba(245, 235, 215, 0.9), rgba(178, 136, 74, 0.4));
    animation: pre-bar 3.2s cubic-bezier(0.45, 0, 0.15, 1) 1.5s forwards;
    box-shadow: 0 0 8px rgba(245, 235, 215, 0.4);
  }
  body.app-ready .preloader-bar-fill {
    width: 100% !important;
    animation: none;
    transition: width 0.45s cubic-bezier(0.3, 0, 0.2, 1);
  }

  .preloader-hint {
    margin-top: 22px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(245, 235, 215, 0.4);
    opacity: 0;
    animation: pre-fade 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.7s forwards, pre-pulse 2.4s ease-in-out 2.6s infinite;
  }

  /* Brand stamp pinned to the corner */
  .preloader-corner {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(245, 235, 215, 0.28);
    opacity: 0;
    animation: pre-fade 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.9s forwards;
  }

  @keyframes pre-fade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pre-mark {
    0%   { opacity: 0; filter: blur(8px); letter-spacing: 0.5em; }
    100% { opacity: 1; filter: blur(0px);  letter-spacing: 0.32em; }
  }
  @keyframes pre-bar {
    0%   { width: 0%; }
    60%  { width: 65%; }
    100% { width: 85%; }
  }
  @keyframes pre-pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 0.75; }
  }
  @media (prefers-reduced-motion: reduce) {
    .preloader-eyebrow, .preloader-mark, .preloader-flourish,
    .preloader-sub, .preloader-bar, .preloader-hint, .preloader-corner {
      animation: none !important;
      opacity: 1 !important;
      filter: none !important;
    }
  }
</style>

<!-- Preloader dismissal: minimum visible time + waits for `grisha:ready` -->
<script>
  (function () {
    var MIN_VISIBLE_MS = 1800;     // brand must register
    var HARD_TIMEOUT_MS = 8000;    // safety net — never trap the user
    var start = performance.now();
    var ready = false;

    function retire() {
      if (ready) return;
      ready = true;
      var elapsed = performance.now() - start;
      var wait = Math.max(0, MIN_VISIBLE_MS - elapsed);
      setTimeout(function () {
        document.body.classList.add('app-ready');
        setTimeout(function () {
          document.body.classList.add('preloader-gone');
        }, 1200);  // matches the CSS opacity transition + buffer
      }, wait);
    }

    window.addEventListener('grisha:ready', retire);
    // Safety net: if JSX fails to compile / network stalls, retire anyway
    setTimeout(retire, HARD_TIMEOUT_MS);
  })();
</script>
